name: Enviar Entrega al Repositorio de Evaluación

on:
  pull_request_target:
    branches:
      - develop
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  copy-to-prof-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Validar configuración
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Token no disponible"
            exit 1
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_DESTINO")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::No se puede acceder al repo privado (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Configuracion valida"

      - name: Checkout código del alumno
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
          path: student-code

      - name: Preparar rama desde develop del repo privado
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
          PR_URL_ORIGINAL: ${{ github.event.pull_request.html_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          BRANCH_NAME="entrega-${ALUMNO}"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO_DESTINO}.git"
          
          echo "=== DEBUG: Iniciando preparación ==="
          
          git clone "${REPO_URL}" private-repo
          cd private-repo
          
          echo "DEBUG: Rama actual: $(git branch --show-current)"
          echo "DEBUG: Último commit: $(git log -1 --oneline)"
          
          if git show-ref --verify --quiet refs/heads/develop; then
            echo "Checkout de develop..."
            git checkout develop
          else
            echo "develop no existe, usando main..."
            git checkout main
          fi
          
          echo "DEBUG: Rama base: $(git branch --show-current)"
          echo "DEBUG: Commit base: $(git log -1 --oneline)"
          
          echo "Creando rama ${BRANCH_NAME}..."
          git checkout -B "${BRANCH_NAME}"
          
          echo "Limpiando contenido..."
          git rm -rf . 2>/dev/null || true
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.entrega-metadata.json' -exec rm -rf {} + 2>/dev/null || true
          
          echo "Copiando código del alumno..."
          cp -rf ../student-code/. ./
          
          # ✅ CREAR MARKER FILE (versión sin heredoc - YAML safe)
          echo "Creando marker file único..."
          echo "{\"alumno\":\"${ALUMNO}\",\"fecha\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"pr_original\":\"${PR_URL_ORIGINAL}\",\"workflow_run_id\":\"${GITHUB_RUN_ID}\",\"commit_sha\":\"${{ github.event.pull_request.head.sha }}\"}" > .entrega-metadata.json
          
          echo "=== DEBUG: Estado después de copiar ==="
          echo "Archivos:"
          ls -la
          echo "Git status:"
          git status --short
          echo "Git diff:"
          git diff --name-only | head -20 || echo "(sin cambios)"

      - name: Commit y push al repo privado
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
          PR_URL_ORIGINAL: ${{ github.event.pull_request.html_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          BRANCH_NAME="entrega-${ALUMNO}"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO_DESTINO}.git"
          
          cd private-repo
          
          git config user.name "Evaluador Automático"
          git config user.email "evaluador@universidad.edu"
          
          echo "Agregando cambios..."
          git add -A
          
          echo "Creando commit..."
          git commit -m "Entrega: ${ALUMNO} - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          
          echo "=== DEBUG: Verificando diferencia con develop ==="
          echo "Commits ahead:"
          git log develop..HEAD --oneline || echo "(ninguno)"
          echo "Archivos cambiados:"
          git diff --name-only develop..HEAD | head -10 || echo "(ninguno)"
          
          if [ -z "$(git diff --name-only develop..HEAD)" ]; then
            echo "Forzando cambio adicional..."
            echo "# Timestamp: $(date +%s%N)" >> .entrega-metadata.json
            git add .entrega-metadata.json
            git commit --amend --no-edit
          fi
          
          echo "Haciendo push..."
          git push -f "${REPO_URL}" "${BRANCH_NAME}"
          echo "Push completado"
          
          echo "=== DEBUG: Verificando push ==="
          git log -1 --oneline
          git ls-remote "${REPO_URL}" "${BRANCH_NAME}"

      - name: Crear PR en repositorio privado
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
          PR_URL_ORIGINAL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          BRANCH_NAME="entrega-${ALUMNO}"
          
          echo "Esperando indexación de GitHub (20s)..."
          sleep 20
          
          echo "=== DEBUG: Verificando commits vía API ==="
          COMPARE=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_DESTINO/compare/develop...${BRANCH_NAME}")
          
          AHEAD_BY=$(echo "$COMPARE" | grep -o '"ahead_by":[0-9]*' | grep -o '[0-9]*')
          echo "Commits ahead of develop: ${AHEAD_BY:-0}"
          
          echo "Buscando PR existente..."
          PR_LIST=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO_DESTINO/pulls?head=jgotuniversidad:${BRANCH_NAME}&base=develop&state=open")
          
          if echo "$PR_LIST" | grep -q '"number"'; then
            EXISTING=$(echo "$PR_LIST" | sed -n 's/.*"number":\([0-9]*\).*/\1/p' | head -1)
            echo "Actualizando PR #${EXISTING}"
            curl -s -X PATCH \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO_DESTINO/pulls/$EXISTING" \
              -d "{\"title\":\"Entrega: ${PR_TITLE} (${ALUMNO})\",\"body\":\"PR Original: ${PR_URL_ORIGINAL}\"}"
            echo "PR #${EXISTING} actualizado"
          else
            echo "Creando nuevo PR..."
          
            CREATE_RESPONSE=$(curl -s -w "|||HTTP:%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO_DESTINO/pulls" \
              -d "{\"title\":\"Entrega: ${PR_TITLE} (${ALUMNO})\",\"head\":\"${BRANCH_NAME}\",\"base\":\"develop\",\"body\":\"PR Original: ${PR_URL_ORIGINAL}\"}")
          
            HTTP_CODE=$(echo "$CREATE_RESPONSE" | grep -o '|||HTTP:[0-9]*' | cut -d: -f2)
            RESPONSE_BODY=$(echo "$CREATE_RESPONSE" | sed 's/|||HTTP:[0-9]*//')
          
            if [ "$HTTP_CODE" = "201" ]; then
              NEW_PR=$(echo "$RESPONSE_BODY" | sed -n 's/.*"number":\([0-9]*\).*/\1/p' | head -1)
              echo "PR #${NEW_PR} creado exitosamente"
            else
              echo "No se pudo crear el PR (HTTP ${HTTP_CODE}): ${RESPONSE_BODY}"
            fi
          fi