name: Enviar Entrega al Repositorio de Evaluación

on:
  # Se activa al abrir o actualizar un PR hacia la rama develop
  pull_request_target:
    branches:
      - develop
    types: [opened, synchronize]

jobs:
  copy-to-prof-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          # Descarga el código exacto que envió el alumno en su PR
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config --global user.name "Evaluador Automático"
          git config --global user.email "evaluador@universidad.edu"

      - name: Empujar rama y crear PR en repositorio privado
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
          TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
          URL_ORIGINAL: ${{ github.event.pull_request.html_url }}
        run: |
          RAMA_LOCAL="entrega-${ALUMNO}"
          
          # 1. Autenticar la herramienta de consola de GitHub (GitHub CLI)
          echo "${TOKEN}" | gh auth login --with-token
          
          # 2. Empujar el código usando el token inyectado directamente en la URL de destino
          git push -f "https://x-access-token:${TOKEN}@github.com/${REPO_DESTINO}" HEAD:refs/heads/${RAMA_LOCAL}
          
          # 3. Crear el Pull Request en el repositorio privado del profesor apuntando a su propia develop
          gh pr create \
            --repo "${REPO_DESTINO}" \
            --head "${RAMA_LOCAL}" \
            --base "develop" \
            --title "Entrega de: ${ALUMNO}" \
            --body "Código enviado automáticamente. PR Original: ${URL_ORIGINAL}" || echo "La rama ha sido actualizada en el repositorio privado."