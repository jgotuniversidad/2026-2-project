name: Sincronizar Entrega a Repo Privado

on:
  pull_request_target:
    branches:
      - develop
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  sync-to-private:
    runs-on: ubuntu-latest
    steps:
      - name: Validar token
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Token no disponible"
            exit 1
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_DESTINO")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::No se puede acceder al repo privado (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Configuracion valida"

      - name: Checkout codigo del alumno (desde su fork)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
          path: student-code

      - name: Sincronizar a repo privado
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
          BRANCH_ORIGINAL: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          GIT_AUTHOR_NAME: "Evaluador Automático"
          GIT_AUTHOR_EMAIL: "evaluador@universidad.edu"
          GIT_COMMITTER_NAME: "Evaluador Automático"
          GIT_COMMITTER_EMAIL: "evaluador@universidad.edu"
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO_DESTINO}.git"
          BRANCH_NAME="entrega-${ALUMNO}-${BRANCH_ORIGINAL}"
          
          echo "Clonando repo privado..."
          git clone "${REPO_URL}" workdir
          cd workdir
          
          git config user.name "Evaluador Automático"
          git config user.email "evaluador@universidad.edu"
          
          echo "Fetch remoto..."
          git fetch origin
          
          if git show-ref --verify --quiet refs/remotes/origin/develop; then
            git checkout develop
            echo "Base: develop"
          elif git show-ref --verify --quiet refs/remotes/origin/main; then
            git checkout main
            echo "Base: main"
          else
            git checkout master
            echo "Base: master"
          fi
          
          echo "Creando rama: ${BRANCH_NAME}"
          git checkout -B "${BRANCH_NAME}"
          
          echo "Limpiando contenido..."
          git rm -rf . 2>/dev/null || true
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} + 2>/dev/null || true
          
          echo "Copiando codigo del alumno..."
          cp -rf ../student-code/. ./
          
          echo "Creando archivo de control..."
          TIMESTAMP=$(date +%s%N)
          echo "alumno=${ALUMNO}" > .sync-control.txt
          echo "rama_original=${BRANCH_ORIGINAL}" >> .sync-control.txt
          echo "pr_url=${PR_URL}" >> .sync-control.txt
          echo "timestamp=${TIMESTAMP}" >> .sync-control.txt
          
          echo "Estado git:"
          git status --short
          
          echo "Creando commit..."
          git add -A
          git -c user.name="Evaluador Automático" -c user.email="evaluador@universidad.edu" commit -m "Entrega: ${ALUMNO} - ${BRANCH_ORIGINAL}"
          
          echo "Haciendo push..."
          git push -f "${REPO_URL}" "${BRANCH_NAME}"
          
          echo "Sincronizacion completada"
          echo "Rama: ${BRANCH_NAME}"
          echo "URL: https://github.com/${REPO_DESTINO}/tree/${BRANCH_NAME}"