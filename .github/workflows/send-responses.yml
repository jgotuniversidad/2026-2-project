name: Sincronizar Entrega a Repo Privado

on:
  pull_request_target:
    branches:
      - develop
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  sync-to-private:
    runs-on: ubuntu-latest
    steps:
      - name: Validar configuración
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Token PROFE_GITHUB_TOKEN no disponible"
            exit 1
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_DESTINO")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::No se puede acceder al repo privado (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Configuracion valida"

      - name: Checkout código del alumno
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          persist-credentials: false
          path: student-code

      - name: Sincronizar a repo privado
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
          BRANCH_ORIGINAL: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          GIT_AUTHOR_NAME: "Evaluador Automático"
          GIT_AUTHOR_EMAIL: "evaluador@universidad.edu"
          GIT_COMMITTER_NAME: "Evaluador Automático"
          GIT_COMMITTER_EMAIL: "evaluador@universidad.edu"
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO_DESTINO}.git"
          
          echo "Clonando repo privado..."
          git clone "${REPO_URL}" workdir
          cd workdir
          
          git config user.name "Evaluador Automático"
          git config user.email "evaluador@universidad.edu"
          
          echo "Actualizando referencias remotas..."
          git fetch origin
          
          if git show-ref --verify --quiet refs/remotes/origin/develop; then
            git checkout develop
            echo "Base: develop"
          elif git show-ref --verify --quiet refs/remotes/origin/main; then
            git checkout main
            echo "Base: main"
          else
            git checkout master
            echo "Base: master"
          fi
          
          echo "Creando/actualizando rama: ${BRANCH_ORIGINAL}"
          git checkout -B "${BRANCH_ORIGINAL}"
          
          echo "Limpiando contenido previo..."
          git rm -rf . 2>/dev/null || true
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} + 2>/dev/null || true
          
          echo "Copiando código del alumno..."
          cp -rf ../student-code/. ./
          
          echo "Agregando metadata de entrega..."
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "{\"alumno\":\"${ALUMNO}\",\"rama\":\"${BRANCH_ORIGINAL}\",\"pr_original\":\"${PR_URL}\",\"sincronizado\":\"${TIMESTAMP}\"}" > .entrega-info.json
          
          echo "Estado antes del commit:"
          git status --short
          
          echo "Creando commit..."
          git add -A
          COMMIT_MSG="Entrega sincronizada: ${ALUMNO} - Rama: ${BRANCH_ORIGINAL} - PR: ${PR_URL}"
          git -c user.name="Evaluador Automático" -c user.email="evaluador@universidad.edu" commit -m "${COMMIT_MSG}"
          
          echo "Haciendo push a repo privado..."
          git push -f "${REPO_URL}" "${BRANCH_ORIGINAL}"
          
          echo "Sincronizacion completada"
          echo "Repo: ${REPO_DESTINO}"
          echo "Rama: ${BRANCH_ORIGINAL}"
          echo "URL: https://github.com/${REPO_DESTINO}/tree/${BRANCH_ORIGINAL}"