name: Enviar Entrega al Repositorio de Evaluación

on:
  pull_request_target:
    branches:
      - develop
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  copy-to-prof-repo:
    runs-on: ubuntu-latest
    steps:
      # ─────────────────────────────────────────────────────────────
      # STEP 0: Validación de configuración
      # ─────────────────────────────────────────────────────────────
      - name: Validar configuración
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
        run: |
          echo "=== Validando configuración ==="
          
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::El secreto PROFE_GITHUB_TOKEN no está disponible"
            exit 1
          fi
          
          # Probar acceso al repo privado vía API (sin -f para no fallar por HTTP)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_DESTINO")
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::No se puede acceder al repo privado (HTTP $HTTP_CODE). Verifica permisos del token."
            exit 1
          fi
          
          echo "✅ Configuración válida"

      # ─────────────────────────────────────────────────────────────
      # STEP 1: Checkout del código del alumno
      # ─────────────────────────────────────────────────────────────
      - name: Checkout código del alumno
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      # ─────────────────────────────────────────────────────────────
      # STEP 2: Configurar Git
      # ─────────────────────────────────────────────────────────────
      - name: Configurar Git
        run: |
          git config --global user.name "Evaluador Automático"
          git config --global user.email "evaluador@universidad.edu"
          git config --global --add safe.directory "*"

      # ─────────────────────────────────────────────────────────────
      # STEP 3: Push al repositorio privado
      # ─────────────────────────────────────────────────────────────
      - name: Push a repositorio privado
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
        run: |
          BRANCH_NAME="entrega-${ALUMNO}"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO_DESTINO}.git"
          
          echo "Pushing to ${REPO_DESTINO} branch: ${BRANCH_NAME}"
          
          # Ejecutar push y capturar salida para debug
          PUSH_OUTPUT=$(git push -f "${REPO_URL}" "HEAD:refs/heads/${BRANCH_NAME}" 2>&1)
          PUSH_STATUS=$?
          
          if [ $PUSH_STATUS -ne 0 ]; then
            echo "::error::Falló el push al repositorio privado"
            echo "Detalles: $PUSH_OUTPUT"
            exit 1
          fi
          
          echo "✅ Push completado"

      # ─────────────────────────────────────────────────────────────
      # STEP 4: Crear/Actualizar PR en repo privado (versión robusta)
      # ─────────────────────────────────────────────────────────────
      - name: Crear PR en repositorio privado
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
          PR_URL_ORIGINAL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set +e  # ✅ Desactivar exit-on-error para manejar errores manualmente
          
          BRANCH_NAME="entrega-${ALUMNO}"
          
          # Función para escapar strings para JSON (básica pero efectiva)
          json_escape() {
            echo -n "$1" | sed 's/\\/\\\\/g; s/"/\\"/g; s/\t/\\t/g; s/\r/\\r/g' | tr -d '\n'
          }
          
          # Preparar variables escapadas
          PR_TITLE_ESCAPED=$(json_escape "Entrega: ${PR_TITLE} (${ALUMNO})")
          PR_BODY_ESCAPED=$(json_escape "Entrega automatizada desde: ${PR_URL_ORIGINAL}")
          
          # Buscar PR existente (sin -f para no fallar si no hay resultados)
          echo "Buscando PR existente para rama: ${BRANCH_NAME}"
          API_RESPONSE=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO_DESTINO/pulls?head=jgotuniversidad:${BRANCH_NAME}&base=develop&state=open")
          
          # Extraer número de PR usando grep más robusto
          EXISTING=$(echo "$API_RESPONSE" | grep -oP '"number"\s*:\s*\K[0-9]+' | head -1)
          
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Actualizando PR #${EXISTING}"
          
            UPDATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO_DESTINO/pulls/$EXISTING" \
              -d "{\"title\":\"${PR_TITLE_ESCAPED}\",\"body\":\"${PR_BODY_ESCAPED}\"}")
          
            UPDATE_CODE=$(echo "$UPDATE_RESPONSE" | tail -n1)
            if [ "$UPDATE_CODE" = "200" ]; then
              echo "✅ PR #${EXISTING} actualizado"
            else
              echo "⚠️ No se pudo actualizar PR #${EXISTING} (HTTP $UPDATE_CODE)"
              echo "Respuesta: $(echo "$UPDATE_RESPONSE" | head -n -1)"
            fi
          else
            echo "Creando nuevo PR"
          
            CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO_DESTINO/pulls" \
              -d "{\"title\":\"${PR_TITLE_ESCAPED}\",\"head\":\"${BRANCH_NAME}\",\"base\":\"develop\",\"body\":\"${PR_BODY_ESCAPED}\"}")
          
            CREATE_CODE=$(echo "$CREATE_RESPONSE" | tail -n1)
            CREATE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')
          
            if [ "$CREATE_CODE" = "201" ]; then
              NEW_PR=$(echo "$CREATE_BODY" | grep -oP '"number"\s*:\s*\K[0-9]+' | head -1)
              echo "✅ PR #${NEW_PR} creado en repo privado"
            else
              echo "⚠️ No se pudo crear el PR (HTTP $CREATE_CODE)"
              echo "Respuesta: $CREATE_BODY"
              # No fallamos el workflow si el push ya se completó
            fi
          fi
          
          set -e  # ✅ Reactivar exit-on-error por si hay más steps