name: Enviar Entrega al Repositorio de Evaluación

on:
  pull_request_target:
    branches:
      - develop
    types: [opened, synchronize]

jobs:
  copy-to-prof-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config --global user.name "Evaluador Automático"
          git config --global user.email "evaluador@universidad.edu"

      - name: Empujar rama y crear PR en repositorio privado
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }} # Usamos la variable nativa de GitHub CLI
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
          URL_ORIGINAL: ${{ github.event.pull_request.html_url }}
        run: |
          RAMA_LOCAL="entrega-${ALUMNO}"
          
          # 1. Validar que el entorno detecte el token correctamente
          if [ -z "$GH_TOKEN" ]; then
            echo "Error: El secreto PROFE_GITHUB_TOKEN no está llegando al script."
            exit 1
          fi
          
          # 2. Configurar Git para usar el token de la CLI de forma transparente en el Push
          gh auth setup-git
          
          # 3. Hacer el push directo usando la URL estándar de GitHub (la CLI se encarga de la clave)
          git push -f "https://github.com/${REPO_DESTINO}.git" HEAD:refs/heads/${RAMA_LOCAL}
          
          # 4. Crear el Pull Request en el repositorio privado
          gh pr create \
            --repo "${REPO_DESTINO}" \
            --head "${RAMA_LOCAL}" \
            --base "develop" \
            --title "Entrega de: ${ALUMNO}" \
            --body "Código enviado automáticamente. PR Original: ${URL_ORIGINAL}" || echo "La rama ha sido actualizada en el repositorio privado."