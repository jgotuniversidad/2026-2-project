name: Enviar Entrega al Repositorio de Evaluación

on:
  pull_request_target:
    branches:
      - develop
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  copy-to-prof-repo:
    runs-on: ubuntu-latest
    steps:
      # ─────────────────────────────────────────────────────────────
      # STEP 0: Validación de configuración
      # ─────────────────────────────────────────────────────────────
      - name: Validar configuración
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::El secreto PROFE_GITHUB_TOKEN no está disponible"
            exit 1
          fi
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_DESTINO")
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::No se puede acceder al repo privado (HTTP $HTTP_CODE)"
            exit  1
          fi
          echo "✅ Configuración válida"

      # ─────────────────────────────────────────────────────────────
      # STEP 1: Checkout del código del alumno (fuente)
      # ─────────────────────────────────────────────────────────────
      - name: Checkout código del alumno
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
          path: student-code  # ✅ Clonar en subdirectorio para no mezclar

      # ─────────────────────────────────────────────────────────────
      # STEP 2: Clonar repo privado y preparar rama desde develop
      # ─────────────────────────────────────────────────────────────
      - name: Preparar rama desde develop del repo privado
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
        run: |
          BRANCH_NAME="entrega-${ALUMNO}"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO_DESTINO}.git"
          
          echo "📦 Clonando repo privado..."
          git clone --depth 1 --branch develop "${REPO_URL}" private-repo
          
          cd private-repo
          
          echo "🌿 Creando/actualizando rama ${BRANCH_NAME} desde develop..."
          git checkout -B "${BRANCH_NAME}"
          
          echo "🧹 Limpiando contenido anterior de la rama (excepto .git)..."
          find . -type f ! -path './.git/*' ! -name '.git' -delete
          find . -type d -empty ! -path './.git/*' -delete || true
          
          echo "📋 Copiando código del alumno..."
          cp -rf ../student-code/* ./
          cp -rf ../student-code/.[!.]* ./ 2>/dev/null || true  # Archivos ocultos
          
          echo "✅ Código copiado. Estado git:"
          git status --short

      # ─────────────────────────────────────────────────────────────
      # STEP 3: Commit y push al repo privado
      # ─────────────────────────────────────────────────────────────
      - name: Commit y push al repo privado
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
          PR_URL_ORIGINAL: ${{ github.event.pull_request.html_url }}
        run: |
          BRANCH_NAME="entrega-${ALUMNO}"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO_DESTINO}.git"
          
          cd private-repo
          
          git config user.name "Evaluador Automático"
          git config user.email "evaluador@universidad.edu"
          
          echo "📝 Creando commit..."
          git add -A
          git commit -m "📝 Entrega de ${ALUMNO}

Automatizado desde: ${PR_URL_ORIGINAL}
Fecha: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "⚠️ Sin cambios para commitear"
  
  echo "📤 Haciendo push a ${BRANCH_NAME}..."
  git push -f "${REPO_URL}" "${BRANCH_NAME}"
  
  echo "✅ Push completado"
  
  # ─────────────────────────────────────────────────────────────
  # STEP 4: Crear/Actualizar PR en repo privado
  # ─────────────────────────────────────────────────────────────
  - name: Crear PR en repositorio privado
    env:
      GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
      REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
      ALUMNO: ${{ github.event.pull_request.user.login }}
      PR_URL_ORIGINAL: ${{ github.event.pull_request.html_url }}
      PR_TITLE: ${{ github.event.pull_request.title }}
    run: |
      BRANCH_NAME="entrega-${ALUMNO}"
      
      echo "🔍 Buscando PR existente para: ${BRANCH_NAME}"
      
      # Buscar PR abierto existente
      PR_LIST=$(curl -s \
        -H "Authorization: token $GH_TOKEN" \
        -H "Accept: application/vnd.github.v3+json" \
        "https://api.github.com/repos/$REPO_DESTINO/pulls?head=jgotuniversidad:${BRANCH_NAME}&base=develop&state=open")
      
      if echo "$PR_LIST" | grep -q '"number"'; then
        EXISTING=$(echo "$PR_LIST" | sed -n 's/.*"number":\([0-9]*\).*/\1/p' | head -1)
        echo "✅ Actualizando PR existente #${EXISTING}"
      
        curl -s -X PATCH \
          -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/$REPO_DESTINO/pulls/$EXISTING" \
          -d '{
            "title": "Entrega: '"${PR_TITLE}"' ('"${ALUMNO}"')",
            "body": "🔗 PR Original: '"${PR_URL_ORIGINAL}"'"
          }'
        echo "✅ PR #${EXISTING} actualizado"
      else
        echo "🆕 Creando nuevo PR..."
      
        CREATE_RESPONSE=$(curl -s -w "|||HTTP_CODE:%{http_code}" -X POST \
          -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/$REPO_DESTINO/pulls" \
          -d '{
            "title": "Entrega: '"${PR_TITLE}"' ('"${ALUMNO}"')",
            "head": "'"${BRANCH_NAME}"'",
            "base": "develop",
            "body": "🔗 PR Original: '"${PR_URL_ORIGINAL}"'"
          }')
      
        HTTP_CODE=$(echo "$CREATE_RESPONSE" | grep -o '|||HTTP_CODE:[0-9]*' | cut -d: -f2)
        RESPONSE_BODY=$(echo "$CREATE_RESPONSE" | sed 's/|||HTTP_CODE:[0-9]*//')
      
        if [ "$HTTP_CODE" = "201" ]; then
          NEW_PR=$(echo "$RESPONSE_BODY" | sed -n 's/.*"number":\([0-9]*\).*/\1/p' | head -1)
          echo "✅✅✅ PR #${NEW_PR} CREADO EXITOSAMENTE ✅✅✅"
        else
          echo "⚠️ No se pudo crear el PR (HTTP $HTTP_CODE)"
          echo "📄 Respuesta: $RESPONSE_BODY"
        fi
      fi