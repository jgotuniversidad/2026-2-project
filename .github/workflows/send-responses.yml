name: Enviar Entrega al Repositorio de Evaluación

on:
  pull_request_target:
    branches:
      - develop
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  copy-to-prof-repo:
    runs-on: ubuntu-latest
    steps:
      # ─────────────────────────────────────────────────────────────
      # STEP 0: Validación rápida de configuración
      # ─────────────────────────────────────────────────────────────
      - name: Validar configuración
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
        run: |
          echo "=== Validando configuración ==="
          
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::El secreto PROFE_GITHUB_TOKEN no está disponible"
            exit 1
          fi
          
          # Probar acceso al repo privado vía API
          if ! curl -sf -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_DESTINO" > /dev/null; then
            echo "::error::No se puede acceder al repositorio privado. Verifica permisos del token."
            exit 1
          fi
          
          echo "✅ Configuración válida"

      # ─────────────────────────────────────────────────────────────
      # STEP 1: Checkout del código del alumno
      # ─────────────────────────────────────────────────────────────
      - name: Checkout código del alumno
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      # ─────────────────────────────────────────────────────────────
      # STEP 2: Configurar Git
      # ─────────────────────────────────────────────────────────────
      - name: Configurar Git
        run: |
          git config --global user.name "Evaluador Automático"
          git config --global user.email "evaluador@universidad.edu"
          git config --global --add safe.directory "*"

      # ─────────────────────────────────────────────────────────────
      # STEP 3: Push al repositorio privado
      # ─────────────────────────────────────────────────────────────
      - name: Push a repositorio privado
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
        run: |
          BRANCH_NAME="entrega-${ALUMNO}"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO_DESTINO}.git"
          
          echo "Pushing to ${REPO_DESTINO} branch: ${BRANCH_NAME}"
          
          if ! git push -f "${REPO_URL}" "HEAD:refs/heads/${BRANCH_NAME}"; then
            echo "::error::Falló el push al repositorio privado"
            exit 1
          fi
          
          echo "✅ Push completado"

      # ─────────────────────────────────────────────────────────────
      # STEP 4: Crear/Actualizar PR en repo privado (API simple)
      # ─────────────────────────────────────────────────────────────
      - name: Crear PR en repositorio privado
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
          PR_URL_ORIGINAL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          BRANCH_NAME="entrega-${ALUMNO}"
          
          # Buscar PR existente
          EXISTING=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_DESTINO/pulls?head=jgotuniversidad:${BRANCH_NAME}&base=develop&state=open" \
            | grep -o '"number":[0-9]*' | head -1 | grep -o '[0-9]*')
          
          PR_BODY="Entrega automatizada desde: ${PR_URL_ORIGINAL}"
          PR_TITLE_FULL="Entrega: ${PR_TITLE} (${ALUMNO})"
          
          if [ -n "$EXISTING" ]; then
            echo "Actualizando PR #${EXISTING}"
            curl -sf -X PATCH \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO_DESTINO/pulls/$EXISTING" \
              -d "{\"title\":\"${PR_TITLE_FULL}\",\"body\":\"${PR_BODY}\"}" \
              || echo "⚠️ No se pudo actualizar el PR existente"
          else
            echo "Creando nuevo PR"
            RESPONSE=$(curl -sf -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO_DESTINO/pulls" \
              -d "{\"title\":\"${PR_TITLE_FULL}\",\"head\":\"${BRANCH_NAME}\",\"base\":\"develop\",\"body\":\"${PR_BODY}\"}")
          
            if echo "$RESPONSE" | grep -q '"number"'; then
              NEW_PR=$(echo "$RESPONSE" | grep -o '"number":[0-9]*' | grep -o '[0-9]*')
              echo "✅ PR #${NEW_PR} creado en repo privado"
            else
              echo "⚠️ No se pudo crear el PR (respuesta: $RESPONSE)"
            fi
          fi