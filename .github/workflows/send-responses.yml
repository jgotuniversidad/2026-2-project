name: Enviar Entrega al Repositorio de Evaluación

on:
  pull_request_target:
    branches:
      - develop
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  copy-to-prof-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Validar configuración
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Token no disponible"
            exit 1
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_DESTINO")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::No se puede acceder al repo privado (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Configuracion valida"

      - name: Checkout código del alumno
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
          path: student-code

      - name: Preparar y sincronizar entrega
        env:
          GH_TOKEN: ${{ secrets.PROFE_GITHUB_TOKEN }}
          REPO_DESTINO: "jgotuniversidad/2026-2-project-responses"
          ALUMNO: ${{ github.event.pull_request.user.login }}
          PR_URL_ORIGINAL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          # ✅ VARIABLES DE ENTORNO GIT - Siempre funcionan
          GIT_AUTHOR_NAME: "Evaluador Automático"
          GIT_AUTHOR_EMAIL: "evaluador@universidad.edu"
          GIT_COMMITTER_NAME: "Evaluador Automático"
          GIT_COMMITTER_EMAIL: "evaluador@universidad.edu"
        run: |
          # Variables
          BRANCH_NAME="entrega-${ALUMNO}"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO_DESTINO}.git"
          
          echo ">>> Clonando repo privado..."
          git clone "${REPO_URL}" workdir
          cd workdir
          
          # ✅ Config adicional como respaldo (aunque las env vars ya funcionan)
          git config user.name "Evaluador Automático"
          git config user.email "evaluador@universidad.edu"
          
          echo ">>> Asegurando rama develop como base..."
          git fetch origin
          
          if git show-ref --verify --quiet refs/remotes/origin/develop; then
            git checkout develop
            echo "Base: develop"
          elif git show-ref --verify --quiet refs/remotes/origin/main; then
            git checkout main
            git checkout -b develop
            git push -u origin develop
            echo "Base: main -> develop creada"
          else
            git checkout master
            git checkout -b develop
            git push -u origin develop
            echo "Base: master -> develop creada"
          fi
          
          BASE_COMMIT=$(git rev-parse HEAD)
          echo "Commit base: ${BASE_COMMIT}"
          
          echo ">>> Creando rama de entrega: ${BRANCH_NAME}"
          git checkout -B "${BRANCH_NAME}"
          
          echo ">>> Limpiando contenido previo..."
          git rm -rf . 2>/dev/null || true
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} + 2>/dev/null || true
          
          echo ">>> Copiando código del alumno..."
          cp -rf ../student-code/. ./
          
          echo ">>> Creando marker file único..."
          UNIQUE_ID="${RANDOM}${RANDOM}$(date +%s)"
          echo "{\"alumno\":\"${ALUMNO}\",\"unique_id\":\"${UNIQUE_ID}\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > .entrega-marker.json
          
          echo ">>> Estado git antes del commit:"
          git status --short
          
          echo ">>> Creando commit..."
          git add -A
          
          # Si no hay cambios detectados, forzar marker adicional
          if git diff --cached --quiet; then
            echo "# Force-$(date +%s%N)" >> .entrega-marker.json
            git add .entrega-marker.json
            echo "Marker forzado agregado"
          fi
          
          # ✅ COMMIT CON -c PARA CONFIG INLINE (doble seguridad)
          git -c user.name="Evaluador Automático" -c user.email="evaluador@universidad.edu" \
            commit -m "Entrega: ${ALUMNO} - ${PR_URL_ORIGINAL}"
          
          NEW_COMMIT=$(git rev-parse HEAD)
          echo "Commit creado: ${NEW_COMMIT}"
          
          echo ">>> Verificando diferencia con develop..."
          COMMITS_AHEAD=$(git rev-list origin/develop..HEAD --count 2>/dev/null || echo "0")
          echo "Commits ahead of origin/develop: ${COMMITS_AHEAD}"
          
          if [ "${COMMITS_AHEAD}" -eq 0 ]; then
            echo "::warning::No se detectan commits diferentes. Intentando push igual..."
          fi
          
          echo ">>> Haciendo push..."
          git push -f "${REPO_URL}" "${BRANCH_NAME}"
          echo "Push completado"
          
          echo ">>> Esperando indexación de GitHub..."
          sleep 25
          
          echo ">>> Verificando vía API..."
          COMPARE=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_DESTINO/compare/develop...${BRANCH_NAME}")
          AHEAD_BY=$(echo "$COMPARE" | grep -o '"ahead_by":[0-9]*' | grep -o '[0-9]*' | head -1)
          echo "ahead_by (API): ${AHEAD_BY:-0}"
          
          echo ">>> Buscando/creando PR..."
          PR_LIST=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_DESTINO/pulls?head=jgotuniversidad:${BRANCH_NAME}&base=develop&state=open")
          
          if echo "$PR_LIST" | grep -q '"number"'; then
            EXISTING=$(echo "$PR_LIST" | sed -n 's/.*"number":\([0-9]*\).*/\1/p' | head -1)
            echo "Actualizando PR #${EXISTING}"
            curl -s -X PATCH \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO_DESTINO/pulls/$EXISTING" \
              -d "{\"title\":\"Entrega: ${PR_TITLE} (${ALUMNO})\",\"body\":\"PR: ${PR_URL_ORIGINAL}\"}"
          else
            echo "Creando nuevo PR"
            CREATE_RESP=$(curl -s -w "|||HTTP:%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO_DESTINO/pulls" \
              -d "{\"title\":\"Entrega: ${PR_TITLE} (${ALUMNO})\",\"head\":\"${BRANCH_NAME}\",\"base\":\"develop\",\"body\":\"PR: ${PR_URL_ORIGINAL}\"}")
          
            HTTP_CODE=$(echo "$CREATE_RESP" | grep -o '|||HTTP:[0-9]*' | cut -d: -f2)
            RESP_BODY=$(echo "$CREATE_RESP" | sed 's/|||HTTP:[0-9]*//')
          
            if [ "$HTTP_CODE" = "201" ]; then
              NEW_PR=$(echo "$RESP_BODY" | sed -n 's/.*"number":\([0-9]*\).*/\1/p' | head -1)
              echo "✅ PR #${NEW_PR} creado exitosamente"
            else
              echo "⚠️ No se pudo crear PR (HTTP ${HTTP_CODE}): ${RESP_BODY}"
            fi
          fi